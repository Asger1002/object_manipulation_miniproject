services:
  miahand_ros2:
    build:
      context: ..
      dockerfile: docker-deployment/Dockerfile
      args:
        - USER_UID=${USER_UID}
        - USER_GID=${USER_GID}
    container_name: miahand_ros2
    network_mode: "host"
    # device_cgroup_rules:
    #   - "c 188:* rmw"
    privileged: true
    tty: true
    stdin_open: true
    volumes:
      - ../:/miahand_ws/src
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${XAUTHORITY}:/tmp/.Xauthority:ro,z # added
      #- ${XDG_RUNTIME_DIR}/${WAYLAND_DISPLAY}:/run/user/1000/${WAYLAND_DISPLAY} # added
    entrypoint: /ros_entrypoint.sh
    environment:
      PYTHONPATH: "/opt/ros/jazzy/lib/python3.12/site-packages"
      QT_X11_NO_MITSHM: 1
      DISPLAY: $DISPLAY
      XAUTHORITY: /tmp/.Xauthority # added
      ROS_AUTOMATIC_DISCOVERY_RANGE: LOCALHOST #added
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp} #added
      # WAYLAND_DISPLAY: ${WAYLAND_DISPLAY}  # added
      # XDG_RUNTIME_DIR: ${XDG_RUNTIME_DIR}  # added # Must match the host's UID directory
      # QT_QPA_PLATFORM: ${QT_QPA_PLATFORM}  # added # Forces Qt apps to use Wayland
      # GDK_BACKEND: ${GDK_BACKEND}          # added # Forces GTK apps to use Wayland

    user: "1000:1000"                  # UID/GID must match the host user for socket access
    userns_mode: "keep-id"             # rootless Podman: preserve host UID mapping for bind-mounted auth files
    # ipc: host                        # Recommended to avoid X11 rendering glitches
    command: /bin/bash

  miahand_description:
    extends: miahand_ros2
    container_name: miahand_ros2_rviz
    command:  >
      bash -c "
        source install/setup.bash &&
        ros2 launch mia_hand_description mia_hand_rviz_launch.py;
        /bin/bash
      "
  miahand_driver:
    extends: miahand_ros2
    container_name: miahand_ros2_driver
    command:  >
      bash -c "
        source install/setup.bash &&
        ros2 launch mia_hand_driver mia_hand_driver_launch.py;
        /bin/bash
      "
  miahand_moveit:
    extends: miahand_ros2
    container_name: miahand_ros2_moveit
    environment:
      - USE_MUJOCO_SIM=${USE_MUJOCO_SIM:-true}
      - USE_MOCK_HARDWARE=${USE_MOCK_HARDWARE:-true}
    command:  >
      bash -c "
        source install/setup.bash &&
        ros2 launch mia_hand_moveit_config mia_hand_moveit.launch.py use_mujoco_sim:=${USE_MUJOCO_SIM:-true} use_mock_hardware:=${USE_MOCK_HARDWARE:-true};
        /bin/bash
      "
  miahand_mujoco:
    extends: miahand_ros2
    container_name: miahand_ros2_mujoco
    environment:
      - MUJOCO_SCENE=${MUJOCO_SCENE:-custom}
      - ENABLE_DEPTH_PUBLISHER=${ENABLE_DEPTH_PUBLISHER:-true}
    command:  >
      bash -c "
        source install/setup.bash &&
        ros2 launch mia_hand_mujoco mia_hand_system_interface_launch.py scene:=${MUJOCO_SCENE:-custom} enable_depth_publisher:=${ENABLE_DEPTH_PUBLISHER:-true};
        /bin/bash
      "
  miahand_ros2_control:
    extends: miahand_ros2
    container_name: miahand_ros2_control
    environment:
      - USE_MOCK_HARDWARE=${USE_MOCK_HARDWARE:-true}
    command:  >
      bash -c "
        source install/setup.bash &&
        ros2 launch mia_hand_ros2_control mia_hand_system_interface_launch.py use_mock_hardware:=${USE_MOCK_HARDWARE:-true};
        /bin/bash
      "

